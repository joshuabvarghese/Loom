name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint & format ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Tidy & download dependencies
        run: |
          go mod tidy
          go mod download

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m --go=1.22 --skip-dirs=vendor

  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.21", "1.22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: go.sum

      - name: Tidy & download dependencies
        run: |
          go mod tidy
          go mod download

      - name: Test with race detector
        run: go test -race -count=1 -timeout=120s ./...

      - name: Upload coverage
        if: matrix.go == '1.22'
        run: |
          go test -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tail -1

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: Tidy & download dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build loom
        run: go build -trimpath -ldflags="-s -w" -o bin/loom .

      - name: Build testserver
        run: go build -trimpath -o bin/testserver ./testserver

      - name: Smoke test
        run: |
          ./bin/loom -demo -listen :19999 -ui :19998 &
          PID=$!
          sleep 2
          curl -sf http://localhost:19998/live  || (kill $PID; exit 1)
          curl -sf http://localhost:19998/ready || (kill $PID; exit 1)
          kill $PID

  # ── Cross-compile ─────────────────────────────────────────────────────────────
  cross:
    name: Cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: Tidy & download dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build -trimpath \
            -ldflags="-s -w" \
            -o "bin/loom-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" .