name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: Tidy & download dependencies
        run: |
          go mod tidy
          go mod download

      - name: Run tests
        run: go test -race -count=1 -timeout=120s ./...

      - name: Build release binaries
        run: |
          VERSION=${{ github.ref_name }}
          mkdir -p dist

          for PLATFORM in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS=${PLATFORM%/*}
            GOARCH=${PLATFORM#*/}
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"

            OUTPUT="dist/loom-${GOOS}-${GOARCH}${EXT}"
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
              go build -trimpath \
                -ldflags="-s -w -X main.Version=${VERSION}" \
                -o "$OUTPUT" .

            echo "Built $OUTPUT ($(du -sh $OUTPUT | cut -f1))"
          done

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/loom-linux-amd64
            dist/loom-linux-arm64
            dist/loom-darwin-amd64
            dist/loom-darwin-arm64
            dist/loom-windows-amd64.exe
            dist/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true