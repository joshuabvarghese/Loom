# loom.toml — config file for Loom
#
# Drop this file in the directory where you run loom, or at:
#   ~/.config/loom/config.toml
#
# CLI flags always win over values here.
# Everything is optional — Loom works fine from flags alone.

# Where Loom listens for gRPC traffic from your client.
listen = ":9999"

# Your gRPC backend.
backend = "localhost:50051"

# Session name — call history goes to ~/.loom/sessions/<session>.jsonl
session = "default"

# Web Inspector, health probes, and metrics all share this address:
#
#   Web Inspector : http://localhost:9998/
#   Health        : http://localhost:9998/health
#   Liveness      : http://localhost:9998/live    (k8s)
#   Readiness     : http://localhost:9998/ready   (k8s)
#   Metrics       : http://localhost:9998/metrics (Prometheus)
ui = ":9998"

# Connect to the backend over TLS.
backend_tls = false

# Skip TLS cert verification. Dev environments only.
backend_tls_skip_verify = false

# Extra debug output.
verbose = false

# Turn off ANSI colour.
no_color = false

[mutate]
  # Path to a JSON file with request/response mutation rules.
  # file = "/etc/loom/rules.json"

[log]
  # Write an NDJSON call log here in addition to the session store.
  # file = "/var/log/loom/calls.jsonl"

  # Minimum log level: debug | info | warn | error
  level = "info"
